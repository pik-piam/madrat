template:
  package: tidytemplate
  bootstrap: 5

development:
  mode: auto

reference:
  - title: Core Workflow
    desc: Main functions to call other pipeline steps
    contents:
      - has_concept("core workflow")

  - title: Available Functions
    desc: Discover available calc, read, and tool functions
    contents:
      - has_concept("available functions")

  - title: Configuration
    desc: Configuration management for the madrat framework
    contents:
      - has_concept("madrat configuration")

  - title: Cache Management
    desc: Functions for handling cached data
    contents:
      - has_concept("cache management")

  - title: Dependency Graph
    desc: Analyze function dependencies in the madrat universe
    contents:
      - has_concept("dependency graph")

  - title: Mapping
    desc: Tools for working with mappings
    contents:
      - has_concept("mapping")

  - title: Aggregation
    desc: Spatial aggregation and disaggregation
    contents:
      - has_concept("aggregation")

  - title: Country Tools
    desc: Country and ISO code handling
    contents:
      - has_concept("country tools")

  - title: Temporal Processing
    desc: Time series manipulation and interpolation
    contents:
      - has_concept("temporal processing")

  - title: Data Manipulation
    desc: General data transformation tools
    contents:
      - has_concept("data manipulation")

  - title: Logging
    desc: Logging and progress messaging
    contents:
      - has_concept("logging")

  - title: Source Downloading
    desc: Helpers for downloading source data
    contents:
      - has_concept("source downloading")

  - title: Madrat Messages
    desc: Madrat-specific messaging system stored in cache
    contents:
      - has_concept("madrat messages")

  - title: Metadata Comments
    desc: Handling metadata comments on magclass objects
    contents:
      - has_concept("metadata comment")

  - title: Source Redirection
    desc: Redirect source data to alternative locations
    contents:
      - has_concept("source redirection")

  - title: Subtype Handling
    desc: Tools for handling subtypes in read functions
    contents:
      - has_concept("subtype handling")

  - title: Code Labeling
    desc: Region code labeling utilities
    contents:
      - has_concept("code labeling")

  - title: Validation
    desc: Data validation and comparison tools
    contents:
      - has_concept("validation")

  - title: Analysis
    desc: Performance analysis tools
    contents:
      - has_concept("analysis")

  - title: Example Functions
    desc: Example implementations for reference
    contents:
      - fullEXAMPLE
      - readTau
      - convertTau
      - calcTauTotal
      - redirectTau

  - title: Internal and Deprecated
    desc: Internal functions and deprecated items
    contents:
      - functionCallString
      - prepFunctionName
      - madlapply
      - madapply
      - madrat-package
